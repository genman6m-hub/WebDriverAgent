name: Build WDA IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Build WDA
        run: |
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM=""

      - name: Sign with ldid
        run: |
          brew install ldid || true
          APP=$(find DerivedData -name "WebDriverAgentRunner-Runner.app" -not -path "*/PlugIns/*" | head -1)
          echo "App path: $APP"
          ldid -S "$APP/WebDriverAgentRunner-Runner"
          ldid -S "$APP/PlugIns/WebDriverAgentRunner.xctest/WebDriverAgentRunner"

      - name: Create IPA
        run: |
          APP=$(find DerivedData -name "WebDriverAgentRunner-Runner.app" -not -path "*/PlugIns/*" | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r WDA.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WDA-IPA
          path: WDA.ipa
